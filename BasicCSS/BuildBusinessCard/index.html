<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Business Card</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="business-card">

  <img 
    class="profile-image" 
    src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" 
    alt="Profile image of a flower used as a placeholder"
  >

  <p class="full-name">Full Name</p>
  <p class="designation">Designation</p>
  <p class="company">Company</p>

  <hr>

  <p>emailaddress@gmail.com</p>
  <p>123-456-7789</p>

  <a class="portfolio-link" href="https://example.com">Portfolio</a>

  <hr>

  <div class="social-media">
    <h2>Connect with me</h2>
    <a href="https://example.com">Twitter</a>
    <a href="https://example.com">LinkedIn</a>
    <a href="https://example.com">GitHub</a>
  </div>

</div>

</body>
</html>
