<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Styled To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<ul class="todo-list">

  <li>
    <input type="checkbox" id="task1">
    <label for="task1">Exercise</label>

    <ul class="sub-item">
      <li>
        <a class="sub-item-link" href="https://www.youtube.com" target="_blank">Workout Video</a>
      </li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task2">
    <label for="task2">Study Coding</label>

    <ul class="sub-item">
      <li>
        <a class="sub-item-link" href="https://www.freecodecamp.org" target="_blank">Coding Practice</a>
      </li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task3">
    <label for="task3">Read</label>

    <ul class="sub-item">
      <li>
        <a class="sub-item-link" href="https://www.goodreads.com" target="_blank">Book Suggestions</a>
      </li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task4">
    <label for="task4">Learn Cybersecurity</label>

    <ul class="sub-item">
      <li>
        <a class="sub-item-link" href="https://tryhackme.com" target="_blank">Practice Labs</a>
      </li>
    </ul>
  </li>

</ul>

</body>
</html>
